<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>City Chevrolet &mdash; Charlotte Lot Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1C2430;
    --ink-soft:#4A5568;
    --bg:#F3F1EC;
    --card:#FFFFFF;
    --line:#E1DED4;
    --line-strong:#C9C5B6;
    --amber:#A8752B;
    --amber-deep:#7E5A21;
    --amber-tint:#F2E4CB;
    --lot:#3C6A4F;
    --lot-tint:#E1EDE4;
    --transit:#7C8593;
    --transit-tint:#EBEBE8;
    --danger:#A23B2C;
    --radius:10px;
    --shadow:0 1px 2px rgba(28,36,48,.06), 0 8px 24px -12px rgba(28,36,48,.15);
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:'Space Mono',monospace;}
  h1,h2,h3,.display{
    font-family:'Oswald',system-ui,sans-serif;
    text-transform:uppercase;
    letter-spacing:.02em;
    margin:0;
  }

  /* ============ HEADER ============ */
  header.site{
    background:var(--ink);
    color:#F3F1EC;
    padding:22px 28px 20px;
    position:sticky;
    top:0;
    z-index:40;
    box-shadow:0 2px 12px rgba(0,0,0,.18);
  }
  .header-row{
    max-width:1400px;
    margin:0 auto;
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:24px;
    flex-wrap:wrap;
  }
  .brand{display:flex; align-items:center; gap:14px;}
  .brand-mark{
    width:42px;height:42px;
    border:2px solid var(--amber);
    border-radius:8px;
    display:flex;align-items:center;justify-content:center;
    font-family:'Oswald',sans-serif;
    font-weight:700;
    font-size:20px;
    color:var(--amber);
    flex-shrink:0;
    letter-spacing:0;
  }
  .brand h1{font-size:23px; font-weight:600; line-height:1.1; color:#fff;}
  .brand .sub{
    font-family:'Inter',sans-serif;
    text-transform:none;
    font-size:12.5px;
    color:#B7BEC9;
    margin-top:3px;
    letter-spacing:.01em;
  }
  .lot-counter{
    text-align:right;
  }
  .lot-counter .num{
    font-family:'Space Mono',monospace;
    font-weight:700;
    font-size:30px;
    color:var(--amber);
    line-height:1;
    font-variant-numeric:tabular-nums;
  }
  .lot-counter .lbl{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.08em;
    color:#9AA2AF;
    margin-top:4px;
  }

  .search-bar{
    max-width:1400px;
    margin:16px auto 0;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }
  .search-input-wrap{
    position:relative;
    flex:1 1 320px;
    min-width:220px;
  }
  .search-input-wrap svg{
    position:absolute; left:12px; top:50%; transform:translateY(-50%);
    opacity:.55;
  }
  #searchInput{
    width:100%;
    padding:11px 14px 11px 38px;
    border-radius:8px;
    border:1px solid #333E4D;
    background:#242D3B;
    color:#fff;
    font-size:14.5px;
    font-family:'Inter',sans-serif;
  }
  #searchInput::placeholder{color:#8A93A2;}
  #searchInput:focus{outline:2px solid var(--amber); outline-offset:1px;}

  select#sortSelect{
    padding:11px 34px 11px 14px;
    border-radius:8px;
    border:1px solid #333E4D;
    background:#242D3B url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" stroke="%23B7BEC9" stroke-width="2"><path d="M3 5l4 4 4-4"/></svg>') no-repeat right 12px center;
    color:#fff;
    font-size:14px;
    font-family:'Inter',sans-serif;
    appearance:none;
    -webkit-appearance:none;
    cursor:pointer;
  }
  select#sortSelect:focus{outline:2px solid var(--amber); outline-offset:1px;}

  .lot-toggle{
    display:flex; align-items:center; gap:9px;
    padding:0 6px;
    color:#E4E7EC;
    font-size:14px;
    user-select:none;
  }
  .switch{
    width:38px;height:22px;border-radius:20px;
    background:#3A4657;
    position:relative;
    cursor:pointer;
    transition:background .15s ease;
    flex-shrink:0;
  }
  .switch.on{background:var(--lot);}
  .switch .knob{
    position:absolute; top:2px; left:2px;
    width:18px;height:18px;border-radius:50%;
    background:#fff;
    transition:left .15s ease;
  }
  .switch.on .knob{left:18px;}
  button.icon-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    background:#242D3B;
    border:1px solid #333E4D;
    color:#fff;
    border-radius:8px;
    padding:0 16px;
    font-family:'Inter',sans-serif;
    font-size:14px;
    cursor:pointer;
  }

  /* ============ LAYOUT ============ */
  .layout{
    max-width:1400px;
    margin:0 auto;
    display:grid;
    grid-template-columns:264px 1fr;
    gap:26px;
    padding:26px 28px 60px;
  }

  /* ============ FILTER PANEL ============ */
  .filters{
    align-self:start;
    position:sticky;
    top:150px;
    max-height:calc(100vh - 170px);
    overflow-y:auto;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:18px 18px 20px;
  }
  .filters-head{
    display:flex; justify-content:space-between; align-items:center;
    gap:10px;
    margin-bottom:14px;
  }
  .filters-head h2{font-size:14px; letter-spacing:.06em; color:var(--ink); flex:1;}
  .filters-head-actions{display:flex; align-items:center; gap:12px;}
  #clearFilters{
    background:none;border:none;
    color:var(--amber-deep);
    font-size:12px;
    font-weight:600;
    cursor:pointer;
    text-decoration:underline;
    padding:0;
  }
  #closeFilters{
    background:none;border:none;
    color:var(--ink-soft);
    font-size:20px;
    line-height:1;
    cursor:pointer;
    padding:0 2px;
  }
  #closeFilters:hover{color:var(--ink);}
  .layout.panel-closed{
    grid-template-columns:1fr;
  }
  .layout.panel-closed .filters{
    display:none;
  }
  .filter-group{
    border-top:1px solid var(--line);
    padding:14px 0;
  }
  .filter-group:first-of-type{border-top:none; padding-top:0;}
  .filter-group summary{
    list-style:none;
    display:flex; justify-content:space-between; align-items:center;
    cursor:pointer;
    font-family:'Oswald',sans-serif;
    font-size:12.5px;
    letter-spacing:.06em;
    text-transform:uppercase;
    color:var(--ink-soft);
    padding:2px 0;
  }
  .filter-group summary::-webkit-details-marker{display:none;}
  .filter-group summary .chev{transition:transform .15s ease; font-size:11px; color:var(--line-strong);}
  .filter-group[open] summary .chev{transform:rotate(90deg);}
  .filter-body{
    margin-top:10px;
    display:flex;
    flex-direction:column;
    gap:2px;
  }
  .opt{
    display:flex; align-items:center; gap:9px;
    padding:5px 4px;
    border-radius:6px;
    cursor:pointer;
    font-size:13.5px;
    color:var(--ink);
  }
  .opt:hover{background:#F6F4EE;}
  .opt input{accent-color:var(--amber); width:15px;height:15px; flex-shrink:0;}
  .opt .swatch{
    width:13px;height:13px;border-radius:50%;
    border:1px solid rgba(0,0,0,.18);
    flex-shrink:0;
  }
  .opt .name{flex:1; line-height:1.25;}
  .opt .count{
    font-family:'Space Mono',monospace;
    font-size:11px;
    color:#9A9584;
  }
  .opt.disabled{opacity:.42; cursor:default;}
  .opt.disabled:hover{background:none;}
  .opt-divider{
    display:flex;
    align-items:center;
    gap:8px;
    margin:8px 2px 4px;
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:.06em;
    color:#B0AC9D;
  }
  .opt-divider::after{
    content:'';
    flex:1;
    height:1px;
    background:var(--line);
  }

  /* ============ RESULTS ============ */
  .results-head{
    display:flex; justify-content:space-between; align-items:baseline;
    margin-bottom:16px;
    flex-wrap:wrap;
    gap:8px;
  }
  .results-head .count-line{font-size:14px; color:var(--ink-soft);}
  .results-head .count-line b{color:var(--ink); font-weight:700;}
  .active-chips{
    display:flex; flex-wrap:wrap; gap:6px;
    margin-bottom:16px;
  }
  .chip{
    display:inline-flex; align-items:center; gap:6px;
    background:var(--amber-tint);
    color:var(--amber-deep);
    border:1px solid #E2C892;
    border-radius:20px;
    padding:5px 8px 5px 12px;
    font-size:12.5px;
    font-weight:600;
  }
  .chip button{
    background:none;border:none;
    color:var(--amber-deep);
    cursor:pointer;
    font-size:15px;
    line-height:1;
    padding:0 2px;
  }

  .grid{
    display:grid;
    grid-template-columns:1fr;
    justify-items:center;
    gap:18px;
  }

  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    display:flex;
    flex-direction:column;
    overflow:hidden;
    transition:transform .12s ease, box-shadow .12s ease;
    width:100%;
    max-width:620px;
  }
  .card:hover{transform:translateY(-2px); box-shadow:0 4px 6px rgba(28,36,48,.08), 0 14px 30px -14px rgba(28,36,48,.25);}

  .card-top{
    padding:14px 16px 12px;
    border-bottom:1px dashed var(--line-strong);
    position:relative;
  }
  .status-tab{
    position:absolute; top:0; right:0;
    font-family:'Space Mono',monospace;
    font-size:10.5px;
    font-weight:700;
    letter-spacing:.04em;
    padding:4px 10px;
    border-bottom-left-radius:8px;
    text-transform:uppercase;
  }
  .status-tab.lot{background:var(--lot-tint); color:var(--lot);}
  .status-tab.transit{background:var(--transit-tint); color:var(--transit);}
  .stock-tag{
    position:absolute; top:24px; right:0;
    font-family:'Space Mono',monospace;
    font-size:10.5px;
    color:#9A9584;
    padding:3px 10px 0;
    text-align:right;
    line-height:1.5;
    max-width:190px;
  }

  .card-top .model-line{
    font-family:'Oswald',sans-serif;
    font-size:18px;
    font-weight:600;
    letter-spacing:.01em;
    color:var(--ink);
    padding-right:150px;
    line-height:1.15;
  }
  .card-top .trim-line{
    font-size:13px;
    color:var(--ink-soft);
    margin-top:3px;
  }
  .card-top .trim-line .yr{
    font-family:'Space Mono',monospace;
    color:#9A9584;
  }

  .card-mid{
    padding:12px 16px;
    display:flex;
    flex-direction:column;
    gap:8px;
    flex:1;
  }
  .color-row{
    display:flex; align-items:center; gap:8px;
    font-size:12.5px;
    color:var(--ink-soft);
  }
  .color-row .swatch{
    width:14px;height:14px;border-radius:50%;
    border:1px solid rgba(0,0,0,.2);
    flex-shrink:0;
  }

  .card-bottom{
    padding:12px 16px 15px;
    border-top:1px solid var(--line);
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
  }
  .price-block{flex:1; min-width:0;}
  .price-toggle{
    display:inline-block;
    margin-top:6px;
    background:none;
    border:none;
    padding:0;
    color:var(--amber-deep);
    font-size:11px;
    font-weight:600;
    letter-spacing:.02em;
    cursor:pointer;
    text-decoration:underline;
    font-family:'Inter',sans-serif;
  }
  .savings-badge{
    display:inline-block;
    background:var(--lot-tint);
    color:var(--lot);
    font-size:11px;
    font-weight:700;
    letter-spacing:.02em;
    padding:3px 8px;
    border-radius:5px;
    margin-top:2px;
  }

  .price-breakdown{
    width:100%;
    font-size:12.5px;
  }
  .price-breakdown .pb-row{
    display:flex;
    justify-content:space-between;
    padding:3px 0;
    color:var(--ink-soft);
  }
  .price-breakdown .pb-row.pb-msrp{color:var(--ink);}
  .price-breakdown .pb-row .pb-val{
    font-family:'Space Mono',monospace;
  }
  .price-breakdown .pb-row.pb-neg .pb-val{color:var(--lot);}
  .price-breakdown .pb-row.pb-pos .pb-val{color:var(--ink-soft);}
  .price-breakdown .pb-divider{
    border-top:1px dashed var(--line-strong);
    margin:4px 0 5px;
  }
  .price-breakdown .pb-row.pb-final{
    padding-top:2px;
  }
  .price-breakdown .pb-row.pb-final .pb-label{
    font-family:'Oswald',sans-serif;
    text-transform:uppercase;
    font-size:11.5px;
    letter-spacing:.04em;
    color:var(--ink);
    align-self:center;
  }
  .price-breakdown .pb-row.pb-final .pb-val{
    font-weight:700;
    font-size:19px;
    color:var(--ink);
  }
  .price-block .msrp{
    font-size:11.5px;
    color:#9A9584;
    text-decoration:line-through;
    font-family:'Space Mono',monospace;
  }
  .price-block .price{
    font-family:'Space Mono',monospace;
    font-weight:700;
    font-size:19px;
    color:var(--ink);
  }
  .price-block .price-lbl{
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:.05em;
    color:var(--lot);
    font-weight:700;
  }
  .stock-block{
    text-align:right;
    font-size:11px;
    color:#9A9584;
    font-family:'Space Mono',monospace;
    line-height:1.4;
  }
  a.view-link{
    display:block;
    text-align:center;
    margin:0 16px 16px;
    padding:9px;
    background:var(--ink);
    color:#fff;
    text-decoration:none;
    border-radius:7px;
    font-size:13px;
    font-weight:600;
    letter-spacing:.02em;
  }
  a.view-link:hover{background:var(--amber-deep);}

  .empty-state{
    grid-column:1/-1;
    text-align:center;
    padding:70px 20px;
    color:var(--ink-soft);
  }
  .empty-state .display{font-size:20px; color:var(--ink); margin-bottom:8px;}
  .empty-state button{
    margin-top:14px;
    background:var(--amber);
    color:#fff;
    border:none;
    padding:10px 20px;
    border-radius:8px;
    font-weight:600;
    cursor:pointer;
    font-family:'Inter',sans-serif;
  }

  footer{
    text-align:center;
    padding:30px 20px 50px;
    color:#9A9584;
    font-size:12px;
  }

  /* focus visibility */
  a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, summary:focus-visible{
    outline:2px solid var(--amber);
    outline-offset:2px;
  }

  @media (prefers-reduced-motion: reduce){
    html{scroll-behavior:auto;}
    *{transition:none !important;}
  }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 900px){
    .layout{grid-template-columns:1fr; padding:18px 16px 50px;}
    button.icon-btn{display:inline-flex; align-items:center; justify-content:center;}
    .filters{
      position:fixed;
      inset:0 0 0 auto;
      top:0; right:0;
      height:100vh;
      width:min(340px,88vw);
      max-height:none;
      border-radius:0;
      transform:translateX(100%);
      transition:transform .2s ease;
      z-index:60;
      box-shadow:-10px 0 30px rgba(0,0,0,.25);
    }
    .filters.open{transform:translateX(0);}
    .filters-scrim{
      display:none;
      position:fixed; inset:0; background:rgba(20,24,32,.45); z-index:55;
    }
    .filters-scrim.open{display:block;}
    .lot-counter{text-align:left;}
    .header-row{align-items:center;}
  }
  @media (max-width:520px){
    header.site{padding:16px 16px 14px;}
    .brand h1{font-size:19px;}
    .grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<header class="site">
  <div class="header-row">
    <div class="brand">
      <div>
        <h1>City Chevrolet</h1>
      </div>
    </div>
    <div class="lot-counter">
      <div class="num" id="headerCount">0</div>
      <div class="lbl">vehicles shown</div>
    </div>
  </div>
  <div class="search-bar">
    <div class="search-input-wrap">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="#B7BEC9" stroke-width="1.6"><circle cx="7" cy="7" r="5.2"/><path d="M11 11l3.5 3.5"/></svg>
      <input id="searchInput" type="text" placeholder="Search model, trim, stock #, or VIN&hellip;">
    </div>
    <select id="sortSelect">
      <option value="price-asc">Price: Low to High</option>
      <option value="price-desc">Price: High to Low</option>
      <option value="newest">Newest Arrival</option>
      <option value="model">Model A&ndash;Z</option>
    </select>
    <label class="lot-toggle">
      <span class="switch on" id="lotSwitch" role="switch" aria-checked="true" tabindex="0"><span class="knob"></span></span>
      On the lot only
    </label>
    <button class="icon-btn" id="openFilters">Filters</button>
  </div>
</header>

<div class="filters-scrim" id="scrim"></div>

<div class="layout">
  <aside class="filters" id="filterPanel" aria-label="Vehicle filters">
    <div class="filters-head">
      <h2>Filter</h2>
      <div class="filters-head-actions">
        <button id="clearFilters">Clear all</button>
        <button id="closeFilters" aria-label="Close filters">&times;</button>
      </div>
    </div>

    <details class="filter-group" open>
      <summary>Model <span class="chev">&#9656;</span></summary>
      <div class="filter-body" id="modelFilters"></div>
    </details>

    <details class="filter-group" open>
      <summary>Trim <span class="chev">&#9656;</span></summary>
      <div class="filter-body" id="trimFilters"></div>
    </details>

    <details class="filter-group">
      <summary>Color <span class="chev">&#9656;</span></summary>
      <div class="filter-body" id="colorFilters"></div>
    </details>

    <details class="filter-group">
      <summary>Features <span class="chev">&#9656;</span></summary>
      <div class="filter-body" id="featureFilters"></div>
    </details>
  </aside>

  <main>
    <div class="results-head">
      <div class="count-line"><b id="resultCount">0</b> vehicles match your filters</div>
    </div>
    <div class="active-chips" id="activeChips"></div>
    <div class="grid" id="grid"></div>
  </main>
</div>

      if(state.searchTerms.length){
        var hay2 = (v.model+' '+v.trim+' '+v.stock+' '+v.vin+' '+(v.color||'')).toLowerCase();
        for(var ti=0; ti<state.searchTerms.length; ti++){
          if(hay2.indexOf(state.searchTerms[ti].toLowerCase())===-1) return false;
        }
      }
      if(excluding!=='model' && state.models.size && !state.models.has(v.model)) return false;
      if(excluding!=='trim' && state.trims.size && !state.trims.has(v.trim)) return false;
      if(excluding!=='color' && state.colors.size && !state.colors.has(v.color)) return false;
      if(excluding!=='feature' && state.features.size){
        for(var f of state.features){ if(v.features.indexOf(f)===-1) return false; }
      }
      return true;
    });
  }

  function fullFiltered(){
    return baseFiltered(null);
  }

  function countBy(items, keyFn){
    var m = {};
    items.forEach(function(v){
      var k = keyFn(v);
      if(k==null) return;
      m[k] = (m[k]||0)+1;
    });
    return m;
  }

  function buildCheckGroup(container, opts, selectedSet, keyName, showSwatch){
    container.innerHTML = '';
    // Available options first (count > 0 or already selected), unavailable ones sink
    // to the bottom. Within each bucket, preserve the original (alphabetical) order.
    var ordered = opts.slice().sort(function(a, b){
      var aAvail = a.count > 0 || selectedSet.has(a.value);
      var bAvail = b.count > 0 || selectedSet.has(b.value);
      if(aAvail === bAvail) return 0;
      return aAvail ? -1 : 1;
    });
    var sawDisabled = false;
    ordered.forEach(function(o){
      var isAvail = o.count > 0 || selectedSet.has(o.value);
      if(!isAvail && !sawDisabled){
        sawDisabled = true;
        var divider = document.createElement('div');
        divider.className = 'opt-divider';
        divider.textContent = 'Not currently available';
        container.appendChild(divider);
      }
      var label = document.createElement('label');
      label.className = 'opt' + (isAvail ? '' : ' disabled');
      var input = document.createElement('input');
      input.type = 'checkbox';
      input.checked = selectedSet.has(o.value);
      // Zero-count options can't be newly selected (nothing would match), but if an
      // option is already selected it stays clickable so the user can deselect it
      // even after other filters have driven its count to zero.
      input.disabled = (o.count === 0 && !input.checked);
      input.addEventListener('change', function(){
        if(input.checked) selectedSet.add(o.value); else selectedSet.delete(o.value);
        render();
      });
      label.appendChild(input);
      if(showSwatch){
        var sw = document.createElement('span');
        sw.className = 'swatch';
        sw.style.background = COLOR_HEX[o.value] || '#CCC';
        label.appendChild(sw);
      }
      var name = document.createElement('span');
      name.className = 'name';
      name.textContent = o.value;
      label.appendChild(name);
      var count = document.createElement('span');
      count.className = 'count';
      count.textContent = o.count;
      label.appendChild(count);
      container.appendChild(label);
    });
  }

  function renderFilters(){
    // Model
    var modelCounts = countBy(baseFiltered('model'), function(v){return v.model;});
    var allModels = Array.from(new Set(INV.map(function(v){return v.model;}))).sort();
    buildCheckGroup(document.getElementById('modelFilters'),
      allModels.map(function(m){return {value:m, count: modelCounts[m]||0};}),
      state.models, 'model', false);

    // Trim (scoped to selected models if any, else all)
    var trimSource = state.models.size ? INV.filter(function(v){return state.models.has(v.model);}) : INV;
    var trimUniverse = Array.from(new Set(trimSource.map(function(v){return v.trim;}))).sort();
    var trimCounts = countBy(baseFiltered('trim'), function(v){return v.trim;});
    buildCheckGroup(document.getElementById('trimFilters'),
      trimUniverse.map(function(t){return {value:t, count: trimCounts[t]||0};}),
      state.trims, 'trim', false);

    // Color
    var colorCounts = countBy(baseFiltered('color'), function(v){return v.color;});
    var allColors = Array.from(new Set(INV.map(function(v){return v.color;}).filter(Boolean))).sort();
    buildCheckGroup(document.getElementById('colorFilters'),
      allColors.map(function(c){return {value:c, count: colorCounts[c]||0};}),
      state.colors, 'color', true);

    // Features
    var featCountsBase = baseFiltered('feature');
    var featCounts = {};
    featCountsBase.forEach(function(v){
      v.features.forEach(function(f){ featCounts[f] = (featCounts[f]||0)+1; });
    });
    var featureList = FEATURE_ORDER.filter(function(f){return featCounts[f]!=null || state.features.has(f);});
    buildCheckGroup(document.getElementById('featureFilters'),
      featureList.map(function(f){return {value:f, count: featCounts[f]||0};}),
      state.features, 'feature', false);
  }

  function renderChips(){
    var wrap = document.getElementById('activeChips');
    wrap.innerHTML = '';
    function addChip(label, onRemove){
      var c = document.createElement('span');
      c.className = 'chip';
      c.textContent = label;
      var btn = document.createElement('button');
      btn.textContent = '\u00d7';
      btn.setAttribute('aria-label', 'Remove ' + label);
      btn.addEventListener('click', function(){ onRemove(); render(); });
      c.appendChild(btn);
      wrap.appendChild(c);
    }
    state.searchTerms.forEach(function(term, idx){ addChip(term, function(){ state.searchTerms.splice(idx,1); }); });
    state.models.forEach(function(m){ addChip(m, function(){ state.models.delete(m); }); });
    state.trims.forEach(function(t){ addChip(t, function(){ state.trims.delete(t); }); });
    state.colors.forEach(function(c){ addChip(c, function(){ state.colors.delete(c); }); });
    state.features.forEach(function(f){ addChip(f, function(){ state.features.delete(f); }); });
  }

  function isAlwaysLast(v){
    return v.model === 'Silverado 1500' && v.trim === 'WT';
  }

  function sortItems(items){
    var arr = items.slice();
    switch(state.sort){
      case 'price-asc': arr.sort(function(a,b){return (a.pricing.price||a.pricing.msrp||0)-(b.pricing.price||b.pricing.msrp||0);}); break;
      case 'price-desc': arr.sort(function(a,b){return (b.pricing.price||b.pricing.msrp||0)-(a.pricing.price||a.pricing.msrp||0);}); break;
      case 'newest': arr.sort(function(a,b){return (b.dateInStock||'').localeCompare(a.dateInStock||'');}); break;
      case 'model': arr.sort(function(a,b){
          return (a.model+a.trim).localeCompare(b.model+b.trim);
        }); break;
    }
    arr.sort(function(a,b){
      return (isAlwaysLast(a)?1:0) - (isAlwaysLast(b)?1:0);
    });
    return arr;
  }

  function fmtSigned(n, kind){
    if(n==null) return '';
    var amt = '$' + Math.round(Math.abs(n)).toLocaleString('en-US');
    return (kind==='neg' ? '\u2212' : '+') + amt;
  }

  function pbRow(label, valueText, kind){
    var row = document.createElement('div');
    row.className = 'pb-row' + (kind ? (' pb-'+kind) : '');
    var l = document.createElement('span');
    l.className = 'pb-label';
    l.textContent = label;
    var v = document.createElement('span');
    v.className = 'pb-val';
    v.textContent = valueText;
    row.appendChild(l);
    row.appendChild(v);
    return row;
  }

  function buildPriceContent(pricing, expanded){
    var frag = document.createDocumentFragment();
    pricing = pricing || {};
    var hasSavings = pricing.totalSavings != null && pricing.totalSavings > 0;

    if(!expanded){
      if(hasSavings && pricing.msrp != null){
        var msrpEl = document.createElement('div');
        msrpEl.className = 'msrp';
        msrpEl.textContent = fmtMoney(pricing.msrp);
        frag.appendChild(msrpEl);
      }
      var priceEl = document.createElement('div');
      priceEl.className = 'price';
      priceEl.textContent = fmtMoney(pricing.price != null ? pricing.price : pricing.msrp);
      frag.appendChild(priceEl);
      var lbl = document.createElement('div');
      lbl.className = 'price-lbl';
      lbl.textContent = hasSavings ? 'Sale Price' : 'MSRP';
      frag.appendChild(lbl);
      return frag;
    }

    // Full breakdown view
    var wrap = document.createElement('div');
    wrap.className = 'price-breakdown';

    if(pricing.msrp != null){
      wrap.appendChild(pbRow('MSRP', fmtMoney(pricing.msrp), 'msrp'));
    }
    var anyLineItem = false;
    if(pricing.citySavings){
      wrap.appendChild(pbRow('City Savings', fmtSigned(pricing.citySavings,'neg'), 'neg'));
      anyLineItem = true;
    }
    if(pricing.customerCash){
      wrap.appendChild(pbRow('Customer Cash Rebate', fmtSigned(pricing.customerCash,'neg'), 'neg'));
      anyLineItem = true;
    }
    if(pricing.bonusCash){
      wrap.appendChild(pbRow('Bonus Cash Rebate', fmtSigned(pricing.bonusCash,'neg'), 'neg'));
      anyLineItem = true;
    }
    if(pricing.dealerFee){
      wrap.appendChild(pbRow('Dealer Fee', fmtSigned(pricing.dealerFee,'pos'), 'pos'));
      anyLineItem = true;
    }
    if(pricing.accessories){
      wrap.appendChild(pbRow('Accessories', fmtSigned(pricing.accessories,'pos'), 'pos'));
      anyLineItem = true;
    }
    var usedFallback = false;
    if(!anyLineItem && hasSavings){
      wrap.appendChild(pbRow('Dealer Discount', fmtSigned(pricing.totalSavings,'neg'), 'neg'));
      anyLineItem = true;
      usedFallback = true;
    }

    // Reconcile: GM's incentive stack sometimes includes conditional offers we don't
    // itemize above. Add a closing adjustment so the total always ties exactly to the
    // real advertised sale price rather than silently drifting.
    if(pricing.price != null && pricing.msrp != null){
      var running = pricing.msrp;
      if(pricing.citySavings) running -= pricing.citySavings;
      if(pricing.customerCash) running -= pricing.customerCash;
      if(pricing.bonusCash) running -= pricing.bonusCash;
      if(pricing.dealerFee) running += pricing.dealerFee;
      if(pricing.accessories) running += pricing.accessories;
      if(usedFallback) running -= pricing.totalSavings;
      var remainder = Math.round(running - pricing.price);
      if(Math.abs(remainder) > 1 && anyLineItem){
        if(remainder > 0){
          wrap.appendChild(pbRow('Additional Savings', fmtSigned(remainder,'neg'), 'neg'));
        } else {
          wrap.appendChild(pbRow('Additional Fees', fmtSigned(remainder,'pos'), 'pos'));
        }
      }
    }

    var divider = document.createElement('div');
    divider.className = 'pb-divider';
    wrap.appendChild(divider);

    wrap.appendChild(pbRow('Sale Price', fmtMoney(pricing.price != null ? pricing.price : pricing.msrp), 'final'));

    frag.appendChild(wrap);
    return frag;
  }

  function card(v){
    var el = document.createElement('div');
    el.className = 'card';

    var top = document.createElement('div');
    top.className = 'card-top';
    var tab = document.createElement('div');
    tab.className = 'status-tab ' + (v.inTransit ? 'transit' : 'lot');
    tab.textContent = v.inTransit ? 'In Transit' : 'On Lot';
    top.appendChild(tab);
    var stockTag = document.createElement('div');
    stockTag.className = 'stock-tag';
    stockTag.innerHTML = 'Stock ' + v.stock + '<br>VIN ' + v.vin;
    top.appendChild(stockTag);
    var modelLine = document.createElement('div');
    modelLine.className = 'model-line';
    modelLine.textContent = v.model;
    top.appendChild(modelLine);
    var trimLine = document.createElement('div');
    trimLine.className = 'trim-line';
    trimLine.innerHTML = '<span class="yr">' + (v.year||'') + '</span> &middot; ' + v.trim;
    top.appendChild(trimLine);
    el.appendChild(top);

    var mid = document.createElement('div');
    mid.className = 'card-mid';
    if(v.color){
      var colorRow = document.createElement('div');
      colorRow.className = 'color-row';
      var sw = document.createElement('span');
      sw.className = 'swatch';
      sw.style.background = COLOR_HEX[v.color] || '#CCC';
      colorRow.appendChild(sw);
      var ct = document.createElement('span');
      ct.textContent = v.color;
      colorRow.appendChild(ct);
      mid.appendChild(colorRow);
    }
    el.appendChild(mid);

    var bottom = document.createElement('div');
    bottom.className = 'card-bottom';
    var priceBlock = document.createElement('div');
    priceBlock.className = 'price-block';
    var expanded = !state.collapsedPricing.has(v.vin);
    function renderPriceBlock(){
      priceBlock.innerHTML = '';
      priceBlock.appendChild(buildPriceContent(v.pricing, expanded));
      var toggleBtn = document.createElement('button');
      toggleBtn.type = 'button';
      toggleBtn.className = 'price-toggle';
      toggleBtn.textContent = expanded ? 'Hide price details \u25B4' : 'Price details \u25BE';
      toggleBtn.addEventListener('click', function(){
        expanded = !expanded;
        if(expanded){ state.collapsedPricing.delete(v.vin); } else { state.collapsedPricing.add(v.vin); }
        renderPriceBlock();
      });
      priceBlock.appendChild(toggleBtn);
    }
    renderPriceBlock();
    bottom.appendChild(priceBlock);

    el.appendChild(bottom);

    var link = document.createElement('a');
    link.className = 'view-link';
    link.href = v.url;
    link.target = '_blank';
    link.rel = 'noopener';
    link.textContent = 'View Details';
    el.appendChild(link);

    return el;
  }

  function render(){
    renderFilters();
    renderChips();
    var items = sortItems(fullFiltered());
    document.getElementById('resultCount').textContent = items.length;
    document.getElementById('headerCount').textContent = items.length;
    var grid = document.getElementById('grid');
    grid.innerHTML = '';
    if(items.length === 0){
      var empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.innerHTML = '<div class="display">No vehicles match</div><div>Try clearing a filter or broadening your search.</div>';
      var btn = document.createElement('button');
      btn.textContent = 'Clear all filters';
      btn.addEventListener('click', clearAll);
      empty.appendChild(btn);
      grid.appendChild(empty);
      return;
    }
    items.forEach(function(v){ grid.appendChild(card(v)); });
  }

  function clearAll(){
    state.search=''; document.getElementById('searchInput').value='';
    state.searchTerms=[];
    state.models.clear(); state.trims.clear(); state.colors.clear(); state.features.clear();
    render();
  }

  document.getElementById('clearFilters').addEventListener('click', clearAll);

  function resolveSearchTerm(term){
    var t = term.toLowerCase();
    var models = Array.from(new Set(INV.map(function(v){return v.model;})));
    var trims = Array.from(new Set(INV.map(function(v){return v.trim;})));
    var colors = Array.from(new Set(INV.map(function(v){return v.color;}).filter(Boolean)));

    var exactModel = models.filter(function(m){return m.toLowerCase()===t;})[0];
    if(exactModel) return {type:'model', value:exactModel};
    var exactTrim = trims.filter(function(tr){return tr.toLowerCase()===t;})[0];
    if(exactTrim) return {type:'trim', value:exactTrim};
    var exactColor = colors.filter(function(c){return c.toLowerCase()===t;})[0];
    if(exactColor) return {type:'color', value:exactColor};

    var subModels = models.filter(function(m){return m.toLowerCase().indexOf(t)!==-1;});
    if(subModels.length===1) return {type:'model', value:subModels[0]};
    var subTrims = trims.filter(function(tr){return tr.toLowerCase().indexOf(t)!==-1;});
    if(subTrims.length===1) return {type:'trim', value:subTrims[0]};
    var subColors = colors.filter(function(c){return c.toLowerCase().indexOf(t)!==-1;});
    if(subColors.length===1) return {type:'color', value:subColors[0]};

    return {type:'text', value:term};
  }

  var searchInput = document.getElementById('searchInput');
  var searchTimer;
  searchInput.addEventListener('input', function(){
    clearTimeout(searchTimer);
    searchTimer = setTimeout(function(){
      state.search = searchInput.value.trim();
      render();
    }, 120);
  });
  searchInput.addEventListener('keydown', function(e){
    if(e.key === 'Enter'){
      e.preventDefault();
      clearTimeout(searchTimer);
      var term = searchInput.value.trim();
      if(term){
        var resolved = resolveSearchTerm(term);
        if(resolved.type === 'model') state.models.add(resolved.value);
        else if(resolved.type === 'trim') state.trims.add(resolved.value);
        else if(resolved.type === 'color') state.colors.add(resolved.value);
        else state.searchTerms.push(resolved.value);
      }
      state.search = '';
      searchInput.value = '';
      render();
    }
  });

  document.getElementById('sortSelect').addEventListener('change', function(e){
    state.sort = e.target.value;
    render();
  });

  var lotSwitch = document.getElementById('lotSwitch');
  function toggleLot(){
    state.lotOnly = !state.lotOnly;
    lotSwitch.classList.toggle('on', state.lotOnly);
    lotSwitch.setAttribute('aria-checked', state.lotOnly);
    render();
  }
  lotSwitch.addEventListener('click', toggleLot);
  lotSwitch.addEventListener('keydown', function(e){
    if(e.key==='Enter' || e.key===' '){ e.preventDefault(); toggleLot(); }
  });

  var filterPanel = document.getElementById('filterPanel');
  var scrim = document.getElementById('scrim');
  var layoutEl = document.querySelector('.layout');
  if(window.matchMedia('(max-width: 900px)').matches){
    layoutEl.classList.add('panel-closed');
  }
  function openFiltersPanel(){
    filterPanel.classList.add('open');
    scrim.classList.add('open');
    layoutEl.classList.remove('panel-closed');
  }
  function closeFiltersPanel(){
    filterPanel.classList.remove('open');
    scrim.classList.remove('open');
    layoutEl.classList.add('panel-closed');
  }
  document.getElementById('openFilters').addEventListener('click', function(){
    if(layoutEl.classList.contains('panel-closed')){
      openFiltersPanel();
    } else {
      closeFiltersPanel();
    }
  });
  document.getElementById('closeFilters').addEventListener('click', closeFiltersPanel);
  scrim.addEventListener('click', closeFiltersPanel);

  render();
})();

</script>
</body>
</html>
